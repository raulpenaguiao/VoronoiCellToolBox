name: Tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    container:
      image: sagemath/sagemath:latest
      options: --user root

    steps:
      - uses: actions/checkout@v4

      - name: Install Macaulay2
        run: |
          apt-get update
          apt-get install -y software-properties-common
          add-apt-repository -y ppa:macaulay2-dev/macaulay2
          apt-get update
          apt-get install -y macaulay2

      - name: Install package and test dependencies
        run: |
          sage -pip install .
          sage -pip install pytest

      - name: Run tests
        run: sage -python -m pytest tests/ -v
