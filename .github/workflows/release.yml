name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  test:
    runs-on: ubuntu-latest
    container:
      image: sagemath/sagemath:latest
      options: --user root

    steps:
      - uses: actions/checkout@v4

      - name: Install Macaulay2
        run: |
          apt-get update
          apt-get install -y macaulay2

      - name: Install package and test dependencies
        run: |
          sage -pip install .
          sage -pip install pytest

      - name: Run tests
        run: sage -python -m pytest tests/ -v

  release:
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build package
        run: |
          pip install build
          python -m build

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/*
